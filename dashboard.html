<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대시보드 | 운평장로교회</title>
  <meta name="robots" content="noindex" />
  <link rel="manifest" href="manifest.json?v=20260701lib13" />
  <meta name="theme-color" content="#032257" />
  <link rel="icon" href="images/favicon-32.png?v=20260701lib13" />
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png?v=20260701lib13" />
  <meta name="apple-mobile-web-app-title" content="운평장로교회" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=20260701lib13" />
  <style>
    .dash-divider{max-width:680px;width:100%;margin:0 auto 26px;border:none;border-top:1px solid var(--line,#e3e7ee)}
    /* 대시보드 내 모든 박스의 폭을 QT 진행표(.form-card 기본 680px)와 동일하게 정렬 */
    #dashRoot .form-card,
    #dashRoot .home-sermon,
    #dashRoot .qt-today,
    #dashRoot .qt-listen-wrap,
    #dashRoot .hb-card{max-width:680px;width:100%;margin-left:auto;margin-right:auto;box-sizing:border-box}
    .hb-card{max-width:860px;margin:0 auto;border:1px solid var(--line,#e3e7ee);border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(3,34,87,.07)}
    .hb-hd{display:flex;justify-content:space-between;align-items:center;background:var(--accent,#032257);color:#fff;padding:14px 26px}
    .hb-hd-week{font-weight:700;font-size:.9rem;letter-spacing:.04em}
    .hb-hd-date{font-size:.84rem;color:rgba(255,255,255,.75)}
    .hb-body{display:grid;grid-template-columns:1fr 1fr;background:#fff}
    .hb-col{padding:22px 24px}
    .hb-col:first-child{border-right:1px solid var(--line,#e3e7ee)}
    .hb-col-title{font-size:.74rem;font-weight:700;color:var(--accent,#032257);text-transform:uppercase;letter-spacing:.07em;margin:0 0 10px;padding-bottom:6px;border-bottom:1px solid var(--line,#e3e7ee)}
    .hb-order{margin:0;padding-left:18px;font-size:.84rem;line-height:1.9;color:var(--ink,#1a2332)}
    .hb-extra{margin:0 0 14px;padding-left:0;list-style:none;font-size:.83rem;line-height:1.85;color:var(--ink-soft,#7b8794)}
    .hb-extra li::before{content:"▸ ";color:var(--accent,#032257);font-size:.8rem}
    .hb-news{margin:0;padding-left:0;list-style:none;font-size:.82rem;line-height:1.75}
    .hb-news li{padding:3px 0;border-bottom:1px dashed #eef1f5}
    .hb-news li:last-child{border-bottom:none}
    .hb-news strong{color:var(--accent,#032257);margin-right:5px}
    .hb-ft{border-top:1px solid var(--line,#e3e7ee);padding:14px 24px;text-align:center;background:#fafbfd}
    @media(max-width:640px){.hb-body{grid-template-columns:1fr}.hb-col:first-child{border-right:none;border-bottom:1px solid var(--line,#e3e7ee)}}
    .qtc-card{padding:26px 28px}
    .qtc-badge{display:inline-block;font-size:.78rem;font-weight:700;color:#fff;background:var(--accent,#032257);padding:5px 14px;border-radius:20px;letter-spacing:.03em}
    .qtc-title{font-family:"Noto Serif KR",serif;font-size:1.35rem;line-height:1.5;color:var(--ink,#1a1a1a);margin:14px 0 4px;word-break:keep-all}
    .qtc-ref{color:var(--accent,#032257);font-size:.95rem;font-weight:600;margin:0 0 18px}
    .qtc-bible{background:var(--paper-alt,#faf8f3);border:1px solid var(--line,#e3e7ee);border-radius:12px;padding:18px 22px;margin-bottom:20px}
    .qtc-verse{display:flex;gap:10px;padding:4px 0;font-family:"Noto Serif KR",serif;font-size:1.02rem;line-height:1.8;color:var(--ink,#1a1a1a)}
    .qtc-vn{flex:0 0 auto;color:var(--accent,#032257);font-weight:700;font-size:.82rem;min-width:20px;margin-top:4px}
    .qtc-head{font-family:"Noto Serif KR",serif;font-size:1.02rem;color:var(--accent,#032257);margin:22px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--line,#e3e7ee)}
    .qtc-body p{font-size:.98rem;line-height:1.9;color:var(--ink,#1a1a1a);word-break:keep-all;margin:0 0 12px}
    .qtc-body p:last-child{margin-bottom:0}
    .qtc-amen{border-top:1px solid var(--line,#e3e7ee);padding-top:16px;margin-top:6px}
    .qtc-amen label{display:flex;align-items:center;gap:9px;cursor:pointer;font-size:.95rem;font-weight:600;color:var(--ink,#1a1a1a)}
    .qtc-amen input{width:19px;height:19px;cursor:pointer;accent-color:var(--accent,#032257)}
    .qtc-amen-done{color:#1e874b;font-weight:700;font-size:.95rem}
    /* 모바일: 안쪽 성경본문 박스의 테두리·배경·여백을 없애 바깥 박스 하나로 보이게 함 */
    @media(max-width:480px){
      #dashRoot .form-card{padding:16px 14px}
      .qtc-card{padding:16px 14px}
      .qtc-bible{background:none;border:none;padding:0;margin-bottom:16px}
      .qtc-verse{font-size:.96rem}
      .qtc-bookentry{padding:9px 10px}
      .qtc-bookentry-body .qtc-bible{margin-bottom:12px}
    }
  </style>
</head>
<body>

  <section class="page-hero">
    <p class="ph-eyebrow">MY DASHBOARD</p>
    <h1>대시보드</h1>
    <p>오늘의 큐티부터 헌금·가계도까지, 나의 신앙 여정을 한눈에 확인하세요. (정회원 전용)</p>
  </section>

  <section class="block">
    <div class="container" style="max-width:900px">
      <div id="dashRoot"><p class="qt-loading">확인 중입니다…</p></div>
    </div>
  </section>

  <!-- ===== 설교 요약 Modal (main.js openSermonSummary가 사용) ===== -->
  <div class="modal" id="bulletinModal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" data-close aria-label="닫기">&times;</button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="js/config.js?v=20260701lib13"></script>
  <script src="js/bulletins.js?v=20260701lib13"></script>
  <script src="js/layout.js?v=20260701lib15"></script>
  <script src="js/main.js?v=20260701lib31"></script>
  <script src="js/finance-api.js?v=20260701lib14"></script>
  <script src="js/dashboard.js?v=20260701lib13"></script>
</body>
</html>
