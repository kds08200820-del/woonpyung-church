<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>교적관리 | 운평장로교회</title>
  <meta name="robots" content="noindex" />
  <link rel="manifest" href="manifest.json?v=20260701qi" />
  <meta name="theme-color" content="#032257" />
  <link rel="icon" href="images/favicon-32.png?v=20260701qi" />
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png?v=20260701qi" />
  <meta name="apple-mobile-web-app-title" content="운평장로교회" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=20260701qi" />
  <style>
    .fin-wrap{max-width:1280px}
    .fin-tabs{display:flex;gap:6px;border-bottom:2px solid var(--line,#e3e7ee);margin:8px 0 20px;flex-wrap:wrap}
    .fin-tabs button{background:none;border:none;padding:10px 16px;font-weight:700;color:var(--ink-soft,#7b8794);border-bottom:3px solid transparent;margin-bottom:-2px;cursor:pointer;font-family:inherit}
    .fin-tabs button.active{color:var(--accent,#032257);border-bottom-color:var(--accent,#032257)}
    .fin-card{background:#fff;border:1px solid var(--line,#e3e7ee);border-radius:12px;padding:18px;margin-bottom:18px}
    .fin-table{width:100%;border-collapse:collapse;font-size:.9rem}
    .fin-table th,.fin-table td{padding:8px 9px;border-bottom:1px solid var(--line,#eef1f5);text-align:left;white-space:nowrap}
    .fin-table td.num,.fin-table th.num{text-align:right;font-variant-numeric:tabular-nums}
    .fin-pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:.72rem;font-weight:700}
    .fin-pill.in{background:#e8f6ee;color:#1e874b}.fin-pill.out{background:#fdecea;color:#c0392b}
    .sw{display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:.85rem}
    .sw input{width:16px;height:16px}
    .af-field label{display:block;font-size:.8rem;color:var(--ink-soft,#7b8794);margin-bottom:4px}
    .af-field input,.af-field select{width:100%;padding:8px 10px;border:1px solid #dfe5ee;border-radius:8px;font:inherit}
  </style>
</head>
<body>
  <section class="page-hero">
    <p class="ph-eyebrow">ADMIN</p>
    <h1>교적관리</h1>
    <p>교인 명단 확인 · 관리자/재정 권한 지정 (관리자 전용)</p>
  </section>

  <section class="block">
    <div class="container fin-wrap">
      <div id="gjRoot"><p class="qt-loading">권한 확인 중입니다…</p></div>
    </div>
  </section>

  <script src="js/config.js?v=20260701qi"></script>
  <script src="js/bulletins.js?v=20260701qi"></script>
  <script src="js/layout.js?v=20260701qi"></script>
  <script src="js/main.js?v=20260701qi"></script>
  <script src="js/upload.js?v=20260701qi"></script>
  <script src="js/finance-api.js?v=20260701qi"></script>
  <script src="js/gyojeok.js?v=20260701qi"></script>
</body>
</html>
