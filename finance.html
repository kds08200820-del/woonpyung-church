<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>재정관리 | 운평장로교회</title>
  <meta name="robots" content="noindex" />
  <link rel="manifest" href="manifest.json?v=20260701plus" />
  <meta name="theme-color" content="#032257" />
  <link rel="icon" href="images/favicon-32.png?v=20260701plus" />
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png?v=20260701plus" />
  <meta name="apple-mobile-web-app-title" content="운평장로교회" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=20260701plus" />
  <style>
    .fin-wrap{max-width:1280px}
    .fin-tabs{display:flex;gap:6px;border-bottom:2px solid var(--line,#e3e7ee);margin:8px 0 20px;flex-wrap:wrap}
    .fin-tabs button{background:none;border:none;padding:10px 16px;font-weight:700;color:var(--ink-soft,#7b8794);border-bottom:3px solid transparent;margin-bottom:-2px;cursor:pointer;font-family:inherit}
    .fin-tabs button.active{color:var(--accent,#032257);border-bottom-color:var(--accent,#032257)}
    .fin-menu{display:flex;gap:2px;flex-wrap:wrap;border-bottom:2px solid var(--line,#e3e7ee);margin:8px 0 20px;position:sticky;top:58px;background:var(--paper,#fff);z-index:40;box-shadow:0 6px 8px -6px rgba(0,0,0,.08)}
    .fin-menu .fm-top{background:none;border:none;padding:11px 18px;font-weight:700;color:var(--ink-soft,#7b8794);border-bottom:3px solid transparent;margin-bottom:-2px;cursor:pointer;font-family:inherit;font-size:1rem;white-space:nowrap}
    .fin-menu .fm-top.active,.fin-menu .fm-group:hover .fm-top{color:var(--accent,#032257);border-bottom-color:var(--accent,#032257)}
    .fm-group{position:relative}
    .fm-drop{position:absolute;top:100%;left:0;background:#fff;border:1px solid var(--line,#e3e7ee);border-radius:0 8px 8px 8px;box-shadow:0 10px 26px rgba(0,0,0,.13);min-width:170px;padding:6px;display:none;z-index:60}
    .fm-group:hover .fm-drop,.fm-group.open .fm-drop{display:block}
    .fm-drop button{display:block;width:100%;text-align:left;background:none;border:none;padding:9px 13px;border-radius:7px;cursor:pointer;font:inherit;color:var(--ink,#1a1a1a)}
    .fm-drop button:hover{background:#f5f8fc}
    .fm-drop button.active{background:var(--accent,#032257);color:#fff}
    .fin-card{background:#fff;border:1px solid var(--line,#e3e7ee);border-radius:12px;padding:18px;margin-bottom:18px}
    .fin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:0 14px}
    .fin-table{width:100%;border-collapse:collapse;font-size:.9rem}
    .fin-table th,.fin-table td{padding:8px 9px;border-bottom:1px solid var(--line,#eef1f5);text-align:left;white-space:nowrap}
    .fin-table td.num,.fin-table th.num{text-align:right;font-variant-numeric:tabular-nums}
    .fin-msg{font-size:.88rem}
    .fin-sugg{position:absolute;background:#fff;border:1px solid var(--line,#e3e7ee);border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,.1);max-height:230px;overflow:auto;z-index:20;min-width:220px}
    .fin-sugg div{padding:8px 11px;cursor:pointer;font-size:.88rem;border-bottom:1px solid #f0f0f0}
    .fin-sugg div:hover,.fin-sugg div.hi{background:#f5f8fc}
    .fin-pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:.72rem;font-weight:700}
    .fin-pill.in{background:#e8f6ee;color:#1e874b}.fin-pill.out{background:#fdecea;color:#c0392b}
    .rcp-badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:.74rem;font-weight:700}
    .rcp-badge.ok{background:#e8f6ee;color:#1e874b}
    .rc-r{display:inline-flex;align-items:center;gap:4px;font-size:.86rem;margin-right:6px;cursor:pointer}
  </style>
</head>
<body>

  <section class="page-hero">
    <p class="ph-eyebrow">FINANCE</p>
    <h1>재정관리</h1>
    <p>헌금·지출을 입력하고 장부를 조회합니다. (권한이 부여된 회원만 이용)</p>
  </section>

  <section class="block">
    <div class="container fin-wrap">
      <div id="finRoot"><p class="qt-loading">권한 확인 중입니다…</p></div>
    </div>
  </section>

  <script src="js/config.js?v=20260701plus"></script>
  <script src="js/bulletins.js?v=20260701plus"></script>
  <script src="js/layout.js?v=20260701plus"></script>
  <script src="js/main.js?v=20260701plus"></script>
  <script src="js/upload.js?v=20260701plus"></script>
  <script src="js/finance-api.js?v=20260701plus"></script>
  <script src="js/finance.js?v=20260701plus"></script>
</body>
</html>
