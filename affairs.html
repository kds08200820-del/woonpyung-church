  <!-- 설교 에디터 글꼴 선택용 · 모두 오픈폰트 라이선스(상업적 이용 무료) -->
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Nanum+Myeongjo:wght@400;700;800&family=Nanum+Pen+Script&family=Gowun+Batang:wght@400;700&family=Song+Myung&family=IBM+Plex+Sans+KR:wght@400;500;700&family=Gaegu:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=20260701lib13" />
  <style>
    .fin-wrap{max-width:1280px}
    .fin-tabs{display:flex;gap:6px;border-bottom:2px solid var(--line,#e3e7ee);margin:8px 0 20px;flex-wrap:wrap}
    .fin-tabs button{position:relative;background:none;border:none;padding:10px 16px;font-weight:700;color:var(--ink-soft,#7b8794);cursor:pointer;font-family:inherit;transition:color .2s ease,transform .2s ease}
    .fin-tabs button::after{content:"";position:absolute;left:14px;right:14px;bottom:-2px;height:3px;border-radius:3px;background:var(--accent,#032257);transform:scaleX(0);transform-origin:center;transition:transform .28s cubic-bezier(.4,0,.2,1)}
    .fin-tabs button:hover{color:var(--accent,#032257);transform:translateY(-1px)}
    .fin-tabs button:hover::after{transform:scaleX(1)}
    .fin-tabs button.active{color:var(--accent,#032257)}
    .fin-tabs button.active::after{transform:scaleX(1)}
    .fin-card{background:#fff;border:1px solid var(--line,#e3e7ee);border-radius:12px;padding:18px;margin-bottom:18px}
    .fin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
    .fin-table{width:100%;border-collapse:collapse;font-size:.9rem}
    .fin-table th,.fin-table td{padding:8px 9px;border-bottom:1px solid var(--line,#eef1f5);text-align:left;vertical-align:top}
    .fin-pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:.72rem;font-weight:700;background:#eef2f7;color:#3a4a63}
    .fin-msg{font-size:.85rem}
    .af-field label{display:block;font-size:.82rem;color:var(--ink-soft,#7b8794);margin-bottom:5px}
    .af-field input,.af-field select,.af-field textarea{width:100%;padding:9px 10px;border:1px solid #dfe5ee;border-radius:8px;font:inherit}
    .af-field textarea{min-height:74px;resize:vertical}
    .fin-sugg{position:absolute;left:0;right:0;top:100%;margin-top:2px;background:#fff;border:1px solid #e3e7ee;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,.12);max-height:240px;overflow:auto;z-index:30}
    .fin-sugg div{padding:8px 11px;cursor:pointer;font-size:.88rem;border-bottom:1px solid #f0f0f0}
    .fin-sugg div:last-child{border-bottom:none}
    .fin-sugg div:hover,.fin-sugg div.hi{background:#f5f8fc}
  </style>
</head>
<body>
  <section class="page-hero">
    <p class="ph-eyebrow">ADMIN</p>
    <h1>목회 행정</h1>
    <p>심방·상담·교육·설교·문서 기록 관리 (관리자 전용)</p>
  </section>

  <section class="block">
    <div class="container fin-wrap">
      <div id="afRoot"><p class="qt-loading">권한 확인 중입니다…</p></div>
    </div>
  </section>

</body>
